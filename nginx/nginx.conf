map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# DNS embebido de Docker — re-resuelve backend/frontend en cada request en
# vez de cachear la IP una sola vez al iniciar nginx. Sin esto, cada restart
# de esos contenedores (rebuild, deploy) deja a nginx apuntando a una IP
# muerta hasta que alguien reinicia nginx también.
resolver 127.0.0.11 valid=10s;

server {
    listen 80;

    location /ws {
        set $upstream_backend backend:8000;
        proxy_pass http://$upstream_backend/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
    }

    # todo el REST del backend vive bajo /api — un solo router fijo, nunca
    # hay que tocar esto cuando se agrega un endpoint nuevo.
    location /api/ {
        set $upstream_backend backend:8000;
        proxy_pass http://$upstream_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # todo lo demás (incluye /_next/* y los assets estáticos) va al frontend.
    # proxy_http_version/Upgrade también aquí: el HMR de Next.js en modo dev
    # abre su propio WebSocket a este mismo origen.
    location / {
        set $upstream_frontend frontend:3000;
        proxy_pass http://$upstream_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
