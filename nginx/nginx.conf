map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# DNS embebido de Docker — re-resuelve backend/frontend en cada request en
# vez de cachear la IP una sola vez al iniciar nginx. Sin esto, cada restart
# de esos contenedores (rebuild, deploy) deja a nginx apuntando a una IP
# muerta hasta que alguien reinicia nginx también.
resolver 127.0.0.11 valid=10s;

server {
    listen 80;

    location /ws {
        # ponytail: NO agregar "/ws" al final de esta proxy_pass. Con un
        # upstream dinámico (variable, para poder re-resolver DNS), nginx
        # maneja distinto una proxy_pass con variable + ruta literal vs solo
        # variable — la primera rompe el handshake de WebSocket y nginx
        # responde 403 sin ni siquiera llegar al backend. Verificado a mano:
        # quitar el "/ws" (la location ya hace match en "/ws", así que se
        # reenvía igual) soluciona el problema sin perder la re-resolución.
        set $upstream_backend backend:8000;
        proxy_pass http://$upstream_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        # ponytail: el default de nginx (60s) cierra el socket si no hay
        # tráfico — y como esta conexión puede estar horas sin un solo evento,
        # eso pasaba todo el rato. El cliente se reconectaba solo (por eso
        # "En vivo" se veía bien), pero cualquier evento publicado justo en
        # ese hueco de reconexión se perdía sin avisar a nadie.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # todo el REST del backend vive bajo /api — un solo router fijo, nunca
    # hay que tocar esto cuando se agrega un endpoint nuevo.
    location /api/ {
        set $upstream_backend backend:8000;
        proxy_pass http://$upstream_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # todo lo demás (incluye /_next/* y los assets estáticos) va al frontend.
    # proxy_http_version/Upgrade también aquí: el HMR de Next.js en modo dev
    # abre su propio WebSocket a este mismo origen.
    location / {
        set $upstream_frontend frontend:3000;
        proxy_pass http://$upstream_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
