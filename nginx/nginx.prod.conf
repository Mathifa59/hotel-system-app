map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# DNS embebido de Docker — re-resuelve backend/frontend/web en cada request
# en vez de cachear la IP una sola vez al iniciar nginx.
resolver 127.0.0.11 valid=10s;

# --- Sitio público: apu-garden-lodge.com y www ---
server {
    listen 80;
    server_name apu-garden-lodge.com www.apu-garden-lodge.com;

    location / {
        set $upstream_web web:3000;
        proxy_pass http://$upstream_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }
}

# --- Sistema de gestión: gestion.apu-garden-lodge.com ---
server {
    listen 80;
    server_name gestion.apu-garden-lodge.com;

    location /ws {
        # ponytail: NO agregar "/ws" al final de esta proxy_pass — con upstream
        # dinámico (variable, para re-resolver DNS), una proxy_pass con
        # variable + ruta literal rompe el handshake de WebSocket. Verificado
        # a mano en el entorno de desarrollo (ver nginx.conf).
        set $upstream_backend backend:8000;
        proxy_pass http://$upstream_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        # el default de nginx (60s) cierra conexiones idle — esta conexión
        # puede estar horas sin un evento.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    location /api/ {
        set $upstream_backend backend:8000;
        proxy_pass http://$upstream_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    location / {
        set $upstream_frontend frontend:3000;
        proxy_pass http://$upstream_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }
}
