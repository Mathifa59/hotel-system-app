services:
  backend:
    volumes: !override []
    ports: !override []
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
      target: runner
    volumes: !override []
    ports: !override []

  # Sitio público (apu-garden-lodge.com) — repo hermano, clonado al mismo
  # nivel que esta carpeta (ver README de despliegue).
  web:
    build:
      context: ../apu-garden-lodge-web
      target: runner

  # nginx (dev) usa un config distinto en producción: agrega el server block
  # del sitio público y quita el bind-mount de código fuente. Cloudflare ya
  # termina HTTPS hacia el visitante (proxy activado, modo Flexible) — el
  # origen solo necesita servir HTTP en el puerto 80, sin certificados
  # propios que mantener.
  nginx:
    volumes: !override
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: !override
      - backend
      - frontend
      - web
